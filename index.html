<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taskmaster Leaderboard</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<h1 class="title">Leaderboard</h1>

</header>


<main class="scoreboard">

<section class="top-five">

<div class="contestant" id="pos1">
<div class="position">1</div>
<div class="name"></div>
<div class="score"></div>
</div>

<div class="contestant" id="pos2">
<div class="position">2</div>
<div class="name"></div>
<div class="score"></div>
</div>

<div class="contestant" id="pos3">
<div class="position">3</div>
<div class="name"></div>
<div class="score"></div>
</div>

<div class="contestant" id="pos4">
<div class="position">4</div>
<div class="name"></div>
<div class="score"></div>
</div>

<div class="contestant" id="pos5">
<div class="position">5</div>
<div class="name"></div>
<div class="score"></div>
</div>

</section>


<section class="remaining">

<h2>Other Competitors</h2>

<div id="others-list">

</div>

</section>


</main>


<footer class="footer">

<p>Taskmaster Scoreboard</p>

</footer>


<script type="module" src="js/scoreboard.js"></script>

</body>

</html>
