<!DOCTYPE html>
<html>
<head>
    <title>Taskmaster Admin</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #1a1a1a; color: white; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: inline-block; width: 100px; font-weight: bold; }
        input { padding: 10px; width: 80px; border-radius: 4px; border: none; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #d32f2f; color: white; border: none; border-radius: 8px; margin-top: 20px; }
        button:hover { background: #ff3d3d; }
    </style>
</head>
<body>
    <h1>Taskmaster Admin</h1>
    <div class="input-group"><label>Player 1:</label> <input type="number" id="p1" value="0"></div>
    <div class="input-group"><label>Player 2:</label> <input type="number" id="p2" value="0"></div>
    <div class="input-group"><label>Player 3:</label> <input type="number" id="p3" value="0"></div>
    <div class="input-group"><label>Player 4:</label> <input type="number" id="p4" value="0"></div>
    <div class="input-group"><label>Player 5:</label> <input type="number" id="p5" value="0"></div>
    <button onclick="updateScores()">SAVE & ANIMATE</button>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


        const firebaseConfig = {
            apiKey: "AIzaSyB-qvtvHOIM2vTWkKtbxEBG47qIO3qg8OI",
            authDomain: "taskmaster-scoreboard-de7b5.firebaseapp.com",
            databaseURL: "https://taskmaster-scoreboard-de7b5-default-rtdb.firebaseio.com",
            projectId: "taskmaster-scoreboard-de7b5",
            storageBucket: "taskmaster-scoreboard-de7b5.firebasestorage.app",
            messagingSenderId: "458963855671",
            appId: "1:458963855671:web:523c967813b9dd4ffc12b2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function updateScores() {
            const scores = {
                p1: parseInt(document.getElementById('p1').value) || 0,
                p2: parseInt(document.getElementById('p2').value) || 0,
                p3: parseInt(document.getElementById('p3').value) || 0,
                p4: parseInt(document.getElementById('p4').value) || 0,
                p5: parseInt(document.getElementById('p5').value) || 0,
                timestamp: Date.now() 
            };
            set(ref(db, 'scores'), scores)
                .then(() => alert("Scores pushed to Firebase!"))
                .catch((err) => alert("Error: " + err.message));
        };

        window.updateScores = updateScores;
    </script>
</body>
</html>
